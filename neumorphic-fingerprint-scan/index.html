<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neumorphic Fingerprint Scan</title>
<style>
  :root{
    --bg:#e6e7ee;
    --btn:#ecedf3;
    --sd:#c2c4cf;
    --sl:#ffffff;
    --dot-idle:#ff5a6b;
    --dot-scan:#27d3ef;
    --raise:-14px -14px 28px var(--sl), 16px 16px 32px var(--sd),
            inset 0 0 0 1px rgba(255,255,255,.4);
    --press:inset -11px -11px 22px var(--sl), inset 13px 13px 24px var(--sd),
            0 0 0 1px rgba(255,255,255,.3);
    --press-ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-family:system-ui,sans-serif;
  }
  .stage{display:flex;flex-direction:column;align-items:center;gap:34px}

  /* 拟物按钮：默认凸起；.on 时按下凹陷（~150ms 自然过渡，移出即弹回） */
  .btn{
    width:260px;height:260px;border-radius:50%;
    background:var(--btn);
    display:flex;align-items:center;justify-content:center;
    position:relative;cursor:pointer;
    box-shadow:var(--raise);
    transition:box-shadow .16s var(--press-ease);
  }
  .btn::before{
    content:"";position:absolute;inset:-26px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.75), transparent 62%);
    z-index:-1;opacity:1;
    transition:opacity .35s var(--press-ease);
  }
  .btn.on{box-shadow:var(--press)}
  .btn.on::before{opacity:.25}

  /* 指纹：两层同一组中心线。draw 由 .on 触发（forwards 保持）；
     移出时 JS 冻结当前 dashoffset，再让整枚 .fp 做 0.55s opacity 渐隐 */
  .fp{
    width:170px;height:206px;overflow:visible;
    opacity:1;transition:opacity .55s ease;
  }
  .btn.off .fp{opacity:0}                /* 移出：整枚均匀淡出（匹配源视频 ~0.6s） */
  .fp path{
    fill:none;stroke-linecap:round;stroke-linejoin:round;
    pathLength:1;stroke-dasharray:1;stroke-dashoffset:1;
    animation-timing-function:ease-out;
    animation-fill-mode:forwards;
  }
  .etch path{
    stroke:#dcdde8;stroke-width:11;
    filter:drop-shadow(-1px -1px 1px rgba(255,255,255,.95))
           drop-shadow(1.4px 1.6px 1.4px rgba(150,152,172,.7));
  }
  .ink path{ stroke:url(#fpGrad);stroke-width:8.5; }
  .btn.on .etch path{
    animation-name:draw;animation-duration:1s;
    animation-delay:calc(var(--i) * 0.018s);
  }
  .btn.on .ink path{
    animation-name:draw;animation-duration:2.4s;
    animation-delay:calc(0.45s + var(--i) * 0.055s);
  }
  @keyframes draw{ from{stroke-dashoffset:1} to{stroke-dashoffset:0} }

  /* 状态点：默认红；.on 转青；移出随淡出复位 */
  .dot{
    width:13px;height:13px;border-radius:50%;
    background:var(--dot-idle);
    box-shadow:0 0 6px 1px rgba(255,90,107,.6);
    transition:background .5s ease, box-shadow .5s ease;
  }
  .btn.on ~ .dot{
    background:var(--dot-scan);
    box-shadow:0 0 16px 5px rgba(39,211,239,.75);
  }
</style>
</head>

<script>
(function(){
  var btn=document.getElementById('btn');
  var paths=btn.querySelectorAll('.fp path');
  var timer=null;
  btn.addEventListener('mouseenter',function(){
    if(timer){clearTimeout(timer);timer=null;}
    btn.classList.remove('off');
    paths.forEach(function(p){p.style.strokeDashoffset='';}); // 清冻结，让 draw 从头跑
    // 强制重排，确保移除 .on 后再加能重启动画
    void btn.offsetWidth;
    btn.classList.add('on');
  });
  btn.addEventListener('mouseleave',function(){
    // 冻结每条当前的 dashoffset —— 移除动画后纹路不瞬移，留给 opacity 渐隐
    paths.forEach(function(p){
      p.style.strokeDashoffset=getComputedStyle(p).strokeDashoffset;
    });
    btn.classList.remove('on');   // 按钮弹回 + 停止描绘
    btn.classList.add('off');     // 整枚 .fp 0.55s opacity 渐进消失
    timer=setTimeout(function(){
      btn.classList.remove('off');
      paths.forEach(function(p){p.style.strokeDashoffset='';}); // 复位待下次
      timer=null;
    },560);
  });
})();
</script>
